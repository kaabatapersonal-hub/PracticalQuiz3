<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar System 3D</title>
    <script src="script/aframe.min.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      #info {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-family: Arial, sans-serif;
        z-index: 10;
        background: rgba(0, 0, 0, 0.5);
        padding: 10px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <div id="info">
      <h2>Solar System</h2>
      <p>Use mouse to rotate camera</p>
    </div>

    <a-scene background="color: #000000">
      <!-- Starfield -->
      <a-sky src="texture/2k_stars_milky_way.jpg"></a-sky>

      <!-- Camera -->
      <a-camera position="0 30 80">
        <a-cursor></a-cursor>
      </a-camera>

      <!-- Lighting -->
      <a-light type="ambient" color="white" intensity="0.4"></a-light>
      <a-light type="point" color="white" intensity="1" position="0 0 0"></a-light>

      <!-- Sun (center) -->
      <a-sphere
        id="sun"
        radius="28"
        position="0 0 0"
        src="texture/2k_sun.jpg"
        animation="property: rotation; to: 0 360 0; dur: 20000; easing: linear; loop: true"
      ></a-sphere>

      <!-- Mercury (orbit 15, speed 47.36) -->
      <a-entity id="mercury-orbit" position="0 0 0" animation="property: rotation; to: 0 360 0; dur: 5878; easing: linear; loop: true">
        <a-sphere
          radius="1.8"
          position="15 0 0"
          src="texture/2k_mercury.jpg"
          animation="property: rotation; to: 0 360 0; dur: 10000; easing: linear; loop: true"
        ></a-sphere>
      </a-entity>

      <!-- Venus (orbit 22, speed 35.02) -->
      <a-entity id="venus-orbit" position="0 0 0" animation="property: rotation; to: 0 360 0; dur: 11280; easing: linear; loop: true">
        <a-sphere
          radius="3.6"
          position="22 0 0"
          src="texture/2k_venus_surface.jpg"
          animation="property: rotation; to: 0 360 0; dur: 8000; easing: linear; loop: true"
        ></a-sphere>
      </a-entity>

      <!-- Earth (orbit 32, speed 29.78) -->
      <a-entity id="earth-orbit" position="0 0 0" animation="property: rotation; to: 0 360 0; dur: 14926; easing: linear; loop: true">
        <a-sphere
          radius="3.8"
          position="32 0 0"
          src="texture/2k_earth_daymap.jpg"
          normal-map="src: texture/2k_earth_normal_map.tif"
          animation="property: rotation; to: 0 360 0; dur: 10000; easing: linear; loop: true"
        ></a-sphere>

        <!-- Moon (orbits Earth) -->
        <a-entity position="32 0 0" animation="property: rotation; to: 0 360 0; dur: 2360; easing: linear; loop: true">
          <a-sphere
            radius="1"
            position="6 0 0"
            src="texture/2k_moon.jpg"
            animation="property: rotation; to: 0 360 0; dur: 5000; easing: linear; loop: true"
          ></a-sphere>
        </a-entity>
      </a-entity>

      <!-- Mars (orbit 45, speed 24.07) -->
      <a-entity id="mars-orbit" position="0 0 0" animation="property: rotation; to: 0 360 0; dur: 21350; easing: linear; loop: true">
        <a-sphere
          radius="2.1"
          position="45 0 0"
          src="texture/2k_mars.jpg"
          animation="property: rotation; to: 0 360 0; dur: 8000; easing: linear; loop: true"
        ></a-sphere>
      </a-entity>

      <!-- Jupiter (orbit 65, speed 13.07) -->
      <a-entity id="jupiter-orbit" position="0 0 0" animation="property: rotation; to: 0 360 0; dur: 36180; easing: linear; loop: true">
        <a-sphere
          radius="11.2"
          position="65 0 0"
          src="texture/2k_jupiter.jpg"
          animation="property: rotation; to: 0 360 0; dur: 10000; easing: linear; loop: true"
        ></a-sphere>
      </a-entity>

      <!-- Saturn (orbit 85, speed 9.68) -->
      <a-entity id="saturn-orbit" position="0 0 0" animation="property: rotation; to: 0 360 0; dur: 50000; easing: linear; loop: true">
        <a-entity position="85 0 0">
          <!-- Saturn sphere -->
          <a-sphere
            radius="9.4"
            src="texture/2k_saturn.jpg"
            animation="property: rotation; to: 0 360 0; dur: 10000; easing: linear; loop: true"
          ></a-sphere>

          <!-- Saturn rings -->
          <a-torus
            radius="12"
            radius-tubular="0.2"
            rotation="70 0 0"
            src="texture/2k_saturn_ring_alpha.png"
            transparent="true"
          ></a-torus>
          <a-torus
            radius="15"
            radius-tubular="0.2"
            rotation="70 0 0"
            src="texture/2k_saturn_ring_alpha.png"
            transparent="true"
          ></a-torus>
          <a-torus
            radius="18"
            radius-tubular="0.2"
            rotation="70 0 0"
            src="texture/2k_saturn_ring_alpha.png"
            transparent="true"
          ></a-torus>
          <a-torus
            radius="21"
            radius-tubular="0.2"
            rotation="70 0 0"
            src="texture/2k_saturn_ring_alpha.png"
            transparent="true"
          ></a-torus>
        </a-entity>
      </a-entity>

      <!-- Uranus (orbit 105, speed 6.8) -->
      <a-entity id="uranus-orbit" position="0 0 0" animation="property: rotation; to: 0 360 0; dur: 68000; easing: linear; loop: true">
        <a-sphere
          radius="4"
          position="105 0 0"
          src="texture/2k_uranus.jpg"
          animation="property: rotation; to: 0 360 0; dur: 12000; easing: linear; loop: true"
        ></a-sphere>
      </a-entity>

      <!-- Neptune (orbit 125, speed 5.43) -->
      <a-entity id="neptune-orbit" position="0 0 0" animation="property: rotation; to: 0 360 0; dur: 85000; easing: linear; loop: true">
        <a-sphere
          radius="3.8"
          position="125 0 0"
          src="texture/2k_neptune.jpg"
          animation="property: rotation; to: 0 360 0; dur: 12000; easing: linear; loop: true"
        ></a-sphere>
      </a-entity>

      <!-- Pluto (orbit 140, speed 4.74) -->
      <a-entity id="pluto-orbit" position="0 0 0" animation="property: rotation; to: 0 360 0; dur: 100000; easing: linear; loop: true">
        <a-sphere
          radius="0.7"
          position="140 0 0"
          src="texture/2k_earth_daymap.jpg"
          animation="property: rotation; to: 0 360 0; dur: 8000; easing: linear; loop: true"
        ></a-sphere>
      </a-entity>


    </a-scene>
  </body>
</html>
